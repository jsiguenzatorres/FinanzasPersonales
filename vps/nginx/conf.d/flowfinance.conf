# ============================================================================
# FlowFinance — Nginx reverse proxy
# Reemplaza flowfinance.app por tu dominio definitivo.
# ============================================================================

# ─── Redirect HTTP → HTTPS ──────────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name flowfinance.app app.flowfinance.app www.flowfinance.app;

  # Para certbot ACME challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── App principal (HTTPS) ──────────────────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name app.flowfinance.app flowfinance.app;

  ssl_certificate     /etc/letsencrypt/live/flowfinance.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/flowfinance.app/privkey.pem;

  # Modern TLS
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;

  # Security headers
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Frame-Options DENY always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Rate limit en auth y API
  location /auth/ {
    limit_req zone=auth burst=10 nodelay;
    proxy_pass http://web:3000;
    include /etc/nginx/conf.d/_proxy_params.conf;
  }

  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass http://web:3000;
    include /etc/nginx/conf.d/_proxy_params.conf;
  }

  location / {
    proxy_pass http://web:3000;
    include /etc/nginx/conf.d/_proxy_params.conf;
  }
}
